  # ── Review 1: Security & Quality ──────────────────────────────────────
  - id: SEC-01
    review_id: R-001
    severity: critical
    category: security
    title: "Non-dict input crashes validator"
    description: "validate() crashes on non-dict input with unhandled TypeError. Any caller passing a non-dict (e.g., from a malformed YAML parse) causes a 500-style crash instead of a graceful error."
    fix: "Added type guard at entry point — returns ValidationResult(success=False, errors=[...]) instead of crashing."
    fix_commit: "25b9ca2"
    verified_by: "test_non_dict_input_fails_gracefully"
    status: verified

  - id: SEC-02
    review_id: R-001
    severity: critical
    category: security
    title: "Type-mismatched fields crash on nested access"
    description: "When archetype or tenure fields are passed as strings instead of dicts, nested dict access (e.g., spec['archetype']['primary']) raises TypeError. Attacker can crash the validator by passing unexpected types."
    fix: "Safe accessor methods _get_dict, _get_list, _get_str guard all nested dict traversal. Non-dict/non-list values return defaults instead of crashing."
    fix_commit: "25b9ca2"
    verified_by: "test_archetype_as_string_fails_gracefully, test_tenure_as_string_fails_gracefully"
    status: verified

  - id: CQ-01
    review_id: R-001
    severity: high
    category: code_quality
    title: "Missing JSON Schema integration"
    description: "Validator had its own validation logic but didn't call jsonschema.validate() against the JSON Schema file. Two validation paths could diverge."
    fix: "Integrated jsonschema.validate() as the canonical validation path. Spawn spec is validated against schemas/spawn-schema.json first, then archetype/permission checks run."
    fix_commit: "25b9ca2"
    status: verified

